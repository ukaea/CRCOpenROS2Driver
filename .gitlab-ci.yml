# ────────────────────────────────────────────────────────────────
#  GitLab CI — Build the Comau CRC-Open ROS 2 driver
#             Tested on Docker executors
#
#  Jobs:
#    • build-rolling : Ubuntu 24.04  + ROS 2 Rolling Ridgeline
# ────────────────────────────────────────────────────────────────

# Default container 
image: ubuntu:24.04

stages: [build]

# -----------------------------------------------------------------
# Template with all build logic
# -----------------------------------------------------------------
.build-template:
  stage: build
  tags: [ubuntu, docker, lower-privacy, meta]

  variables:
    DEBIAN_FRONTEND: noninteractive
    ORL_DRIVER_ROOT: "/usr"
    CMAKE_PREFIX_PATH: "$CMAKE_PREFIX_PATH:/usr/lib/cmake/orl_driver"
    LD_LIBRARY_PATH:  "$LD_LIBRARY_PATH:/usr/lib"
    PKG_CONFIG_PATH:  "$PKG_CONFIG_PATH:/usr/lib/pkgconfig"

  before_script:
    - apt-get update -y

  script: |
    # 1) Base tools & locale --------------------------------------------------
    apt-get install -y --no-install-recommends \
          locales curl gnupg2 lsb-release build-essential ca-certificates wget
    locale-gen en_US.UTF-8
    update-locale LC_ALL=en_US.UTF-8 LANG=en_US.UTF-8

    # 2) Add the ROS 2 apt repository  (works for *all* distros) -------------
    echo ">>> Configuring ROS 2 apt repo for $ROS_DISTRO"
    curl -fsSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
        | gpg --dearmor -o /usr/share/keyrings/ros-archive-keyring.gpg
    echo "deb [arch=$(dpkg --print-architecture) \
             signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] \
          http://packages.ros.org/ros2/ubuntu \
          $(. /etc/os-release && echo $UBUNTU_CODENAME) main" \
        > /etc/apt/sources.list.d/ros2.list
        
    # 2.5) Pre-fetch and install libcap-dev over HTTPS to bypass HTTP block --
    wget -O /tmp/libcap-dev_2.66-5ubuntu2.2_amd64.deb \
      https://security.ubuntu.com/ubuntu/pool/main/libc/libcap2/libcap-dev_2.66-5ubuntu2.2_amd64.deb || true
    if [ -f /tmp/libcap-dev_2.66-5ubuntu2.2_amd64.deb ]; then
      apt-get install -y /tmp/libcap-dev_2.66-5ubuntu2.2_amd64.deb || \
      (dpkg -i /tmp/libcap-dev_2.66-5ubuntu2.2_amd64.deb && apt-get -f install -y)
    fi
    
    # 3) Install ROS 2 core + build tools ------------------------------------
    apt-get update -y
    apt-get install -y --no-install-recommends \
          ros-${ROS_DISTRO}-ros-base \
          ros-${ROS_DISTRO}-xacro \
          ros-${ROS_DISTRO}-ros2-control \
          ros-${ROS_DISTRO}-ros2-controllers \
          python3-colcon-common-extensions python3-argcomplete \
          python3-pip python3-rosdep

    # 4) ROS environment, rosdep initialisation ------------------------------
    source /opt/ros/${ROS_DISTRO}/setup.bash
    rosdep init  || true
    rosdep update

    # 5) Resolve package dependencies ----------------------------------------
    cd "${CI_PROJECT_DIR}"
    rosdep install --from-paths . -r --rosdistro ${ROS_DISTRO} --ignore-src -y

    # 6) install proprietary ORL .deb -----------------------------
    apt-get install -y "${CI_PROJECT_DIR}"/crcopen_hardware/lib/orl_driver-*.deb || true

    ORL_DRIVER_ROOT=$(dpkg -L orl_driver 2>/dev/null | \
                      grep '/include$' | head -n1 | xargs dirname)
    [ -z "$ORL_DRIVER_ROOT" ] && ORL_DRIVER_ROOT=/usr
    echo "Using ORL_DRIVER_ROOT=$ORL_DRIVER_ROOT"

    export CMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH:$ORL_DRIVER_ROOT/lib/cmake/orl_driver"
    export LD_LIBRARY_PATH="$LD_LIBRARY_PATH:$ORL_DRIVER_ROOT/lib"
    export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$ORL_DRIVER_ROOT/lib/pkgconfig"

    # 7) Build the driver -----------------------------------------------------
    source /opt/ros/${ROS_DISTRO}/setup.bash
    colcon build --event-handlers console_direct+

# -----------------------------------------------------------------
# Concrete jobs
# -----------------------------------------------------------------

build-rolling:
  extends: .build-template
  variables:
    ROS_DISTRO: rolling
  rules: [ { when: always } ]