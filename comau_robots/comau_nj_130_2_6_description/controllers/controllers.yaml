controller_manager:
  ros__parameters:
    update_rate: 2500  # Hz
    enforce_command_limits: false # command limits are enforced by the driver itself
    # hardware_components_initial_state:
    #   inactive:
    #     - comau_nj_130_2_6

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    position_controller:
      type: position_controllers/JointGroupPositionController

    velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    acceleration_controller:
      type: forward_command_controller/ForwardCommandController

    current_controller:
      type: forward_command_controller/ForwardCommandController

    torque_controller:
      type: forward_command_controller/ForwardCommandController

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController


joint_state_broadcaster:
  # If 'joints' and/or 'interfaces' is left blank, all will be published in compiled URDF order.
  # Listing them explictly defines the order in the published message.
  ros__parameters:
    map_interface_to_joint_state: 
      effort: current
    joints:
      - waist
      - shoulder
      - elbow_active
      - forearm_roll
      - wrist_angle
      - wrist_rotate
    interfaces:
      - position
      - velocity
      - current

position_controller:
  ros__parameters:
    joints:
      - waist
      - shoulder
      - elbow_active
      - forearm_roll
      - wrist_angle
      - wrist_rotate

velocity_controller:
  ros__parameters:
    joints:
      # - waist
      # - shoulder
      # - elbow_active
      - forearm_roll
      - wrist_angle
      # - wrist_rotate

acceleration_controller:
  ros__parameters:
    joints:
      - waist
      - shoulder
      - elbow_active
      - forearm_roll
      - wrist_angle
      - wrist_rotate
    interface_name: acceleration

current_controller:
  ros__parameters:
    joints:
      - waist
      - shoulder
      - elbow_active
      - forearm_roll
      - wrist_angle
      - wrist_rotate
    interface_name: current

torque_controller:
  ros__parameters:
    joints:
      - waist
      - shoulder
      - elbow_active
      - forearm_roll
      - wrist_angle
      - wrist_rotate
    interface_name: torque

joint_trajectory_controller:
  ros__parameters:
    joints:
      - waist
      - shoulder
      - elbow_active
      - forearm_roll
      - wrist_angle
      - wrist_rotate
    command_interfaces:
      - position
      # - velocity
      # - effort
    state_interfaces:
      - position
      - velocity
      # - effort
    action_monitor_rate: 1.0