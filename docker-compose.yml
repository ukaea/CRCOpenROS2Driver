services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO:-rolling}
    image: comau_driver:dev
    container_name: comau_dev
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    privileged: true
    environment:
      - ROS_DISTRO=${ROS_DISTRO:-rolling}
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - ./:/ros2_ws/src/comau-crcopen-ros2-driver:rw
      - ./.colcon/build:/ros2_ws/build:rw
      - ./.colcon/install:/ros2_ws/install:rw
      - ./.colcon/log:/ros2_ws/log:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: bash -lc "install_dev.sh || true; sleep infinity"

